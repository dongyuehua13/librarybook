<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>座位列表 - 图书馆座位预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/site.css">
</head>
<body>

  <nav class="frontend-nav">
    <div class="brand"><i class="bi bi-book"></i> 图书馆座位预约</div>
    <button class="hamburger"><i class="bi bi-list"></i></button>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="seats.html" class="active">座位列表</a>
      <a href="my-reservations.html">我的预约</a>
    </div>
    <div class="user-area" onclick="this.querySelector('.user-dropdown').classList.toggle('show')">
      <div class="avatar"><i class="bi bi-person"></i></div>
      <div class="user-dropdown">
        <a href="my-reservations.html"><i class="bi bi-calendar-check"></i> 我的预约</a>
        <a href="#"><i class="bi bi-arrow-repeat"></i> 切换账号</a>
        <div class="divider"></div>
        <a href="index.html"><i class="bi bi-box-arrow-right"></i> 退出</a>
      </div>
    </div>
  </nav>

  <div class="frontend-page">
    <h2 style="font-size:20px;font-weight:600;margin-bottom:12px;"><i class="bi bi-grid-3x3-gap"></i> 座位列表</h2>

    <div class="filter-bar">
      <select>
        <option>全部楼层</option>
        <option>1F</option>
        <option>2F</option>
        <option>3F</option>
      </select>
      <select>
        <option>全部区域</option>
        <option>自习区</option>
        <option>安静区</option>
        <option>电子阅览区</option>
      </select>
      <button class="btn-reset">重置</button>
    </div>

    <div class="floor-tabs">
      <span class="floor-tab active">全部</span>
      <span class="floor-tab">1F</span>
      <span class="floor-tab">2F</span>
      <span class="floor-tab">3F</span>
    </div>

    <div class="seat-grid">
      <div class="seat-card">
        <div class="seat-number">A-01</div>
        <div class="seat-info">1F · 自习区</div>
        <div class="seat-info">靠窗位置，有插座</div>
        <div style="margin-top:6px;"><span class="badge free">空闲</span></div>
        <a href="detail.html" class="btn-detail">查看详情</a>
      </div>
      <div class="seat-card occupied">
        <div class="seat-number">A-02</div>
        <div class="seat-info">1F · 自习区</div>
        <div class="seat-info">靠窗位置</div>
        <div style="margin-top:6px;"><span class="badge occupied">已预约</span></div>
        <a href="detail.html" class="btn-detail">查看详情</a>
      </div>
      <div class="seat-card">
        <div class="seat-number">A-03</div>
        <div class="seat-info">1F · 自习区</div>
        <div class="seat-info">中间位置</div>
        <div style="margin-top:6px;"><span class="badge free">空闲</span></div>
        <a href="detail.html" class="btn-detail">查看详情</a>
      </div>
      <div class="seat-card">
        <div class="seat-number">A-04</div>
        <div class="seat-info">1F · 自习区</div>
        <div class="seat-info">中间位置，有插座</div>
        <div style="margin-top:6px;"><span class="badge free">空闲</span></div>
        <a href="detail.html" class="btn-detail">查看详情</a>
      </div>
      <div class="seat-card occupied">
        <div class="seat-number">B-01</div>
        <div class="seat-info">2F · 安静区</div>
        <div class="seat-info">独立隔间</div>
        <div style="margin-top:6px;"><span class="badge occupied">已预约</span></div>
        <a href="detail.html" class="btn-detail">查看详情</a>
      </div>
      <div class="seat-card">
        <div class="seat-number">B-02</div>
        <div class="seat-info">2F · 安静区</div>
        <div class="seat-info">独立隔间</div>
        <div style="margin-top:6px;"><span class="badge free">空闲</span></div>
        <a href="detail.html" class="btn-detail">查看详情</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
