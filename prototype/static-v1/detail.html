<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>座位详情 - 图书馆座位预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/site.css">
  <style>
    .info-table { width: 100%; }
    .info-table td { padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .info-table td:first-child { color: var(--secondary); width: 80px; }
  </style>
</head>
<body>

  <nav class="frontend-nav">
    <div class="brand"><i class="bi bi-book"></i> 图书馆座位预约</div>
    <button class="hamburger"><i class="bi bi-list"></i></button>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="seats.html" class="active">座位列表</a>
      <a href="my-reservations.html">我的预约</a>
    </div>
    <div class="user-area" onclick="this.querySelector('.user-dropdown').classList.toggle('show')">
      <div class="avatar"><i class="bi bi-person"></i></div>
      <div class="user-dropdown">
        <a href="my-reservations.html"><i class="bi bi-calendar-check"></i> 我的预约</a>
        <a href="#"><i class="bi bi-arrow-repeat"></i> 切换账号</a>
        <div class="divider"></div>
        <a href="index.html"><i class="bi bi-box-arrow-right"></i> 退出</a>
      </div>
    </div>
  </nav>

  <div class="frontend-page">
    <div class="breadcrumb">
      <a href="seats.html">座位列表</a>
      <span class="sep">></span>
      <span>A-01</span>
    </div>

    <div class="card">
      <div class="card-body">
        <table class="info-table">
          <tr><td>座位编号</td><td><strong>A-01</strong></td></tr>
          <tr><td>楼层</td><td>1 楼</td></tr>
          <tr><td>区域</td><td>自习区</td></tr>
          <tr><td>描述</td><td>靠窗位置，有插座</td></tr>
          <tr><td>当前状态</td><td><span class="tag tag-active">空闲</span></td></tr>
        </table>
        <a href="reserve.html" class="btn btn-primary btn-block" style="margin-top:14px;"><i class="bi bi-plus-circle"></i> 预约此座位</a>
      </div>
    </div>

    <h3 style="font-size:16px;font-weight:600;margin:16px 0 10px;">预约记录</h3>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>日期</th><th>时段</th><th>状态</th><th>用户</th></tr></thead>
          <tbody>
            <tr><td>2026-07-06</td><td>10:00 - 12:00</td><td><span class="tag tag-reserved">已预约</span></td><td>张三</td></tr>
            <tr><td>2026-07-05</td><td>14:00 - 16:00</td><td><span class="tag tag-cancelled">已取消</span></td><td>李四</td></tr>
            <tr><td>2026-07-04</td><td>9:00 - 11:00</td><td><span class="tag tag-cancelled">已取消</span></td><td>王五</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
