<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>预约座位 - 图书馆座位预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/site.css">
</head>
<body>

  <nav class="frontend-nav">
    <div class="brand"><i class="bi bi-book"></i> 图书馆座位预约</div>
    <button class="hamburger"><i class="bi bi-list"></i></button>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="seats.html">座位列表</a>
      <a href="my-reservations.html">我的预约</a>
    </div>
    <div class="user-area" onclick="this.querySelector('.user-dropdown').classList.toggle('show')">
      <div class="avatar"><i class="bi bi-person"></i></div>
      <div class="user-dropdown">
        <a href="my-reservations.html"><i class="bi bi-calendar-check"></i> 我的预约</a>
        <a href="#"><i class="bi bi-arrow-repeat"></i> 切换账号</a>
        <div class="divider"></div>
        <a href="index.html"><i class="bi bi-box-arrow-right"></i> 退出</a>
      </div>
    </div>
  </nav>

  <div class="frontend-page">
    <div class="breadcrumb">
      <a href="seats.html">座位列表</a>
      <span class="sep">></span>
      <a href="detail.html">A-01</a>
      <span class="sep">></span>
      <span>预约</span>
    </div>

    <div class="card">
      <div class="card-header" style="background:var(--primary);color:#fff;">
        <i class="bi bi-plus-circle"></i> 预约座位 A-01
      </div>
      <div class="card-body">
        <div class="alert alert-info"><i class="bi bi-info-circle"></i> 1楼 · 自习区 · 靠窗位置，有插座</div>

        <form onsubmit="showSuccess(event)">
          <div class="form-group">
            <label>预约日期</label>
            <input type="date" value="2026-07-06" min="2026-07-06">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>开始时间</label>
              <select>
                <option value="8:00">8:00</option>
                <option value="9:00">9:00</option>
                <option value="10:00" selected>10:00</option>
                <option value="11:00">11:00</option>
                <option value="12:00">12:00</option>
                <option value="13:00">13:00</option>
                <option value="14:00">14:00</option>
                <option value="15:00">15:00</option>
                <option value="16:00">16:00</option>
                <option value="17:00">17:00</option>
                <option value="18:00">18:00</option>
                <option value="19:00">19:00</option>
                <option value="20:00">20:00</option>
                <option value="21:00">21:00</option>
              </select>
            </div>
            <div class="form-group">
              <label>结束时间</label>
              <select>
                <option value="9:00">9:00</option>
                <option value="10:00" selected>10:00</option>
                <option value="11:00">11:00</option>
                <option value="12:00">12:00</option>
                <option value="13:00">13:00</option>
                <option value="14:00">14:00</option>
                <option value="15:00">15:00</option>
                <option value="16:00">16:00</option>
                <option value="17:00">17:00</option>
                <option value="18:00">18:00</option>
                <option value="19:00">19:00</option>
                <option value="20:00">20:00</option>
                <option value="21:00">21:00</option>
                <option value="22:00">22:00</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="submitBtn"><i class="bi bi-check-circle"></i> 提交预约</button>
        </form>

        <div id="resultMsg" style="margin-top:12px;"></div>
      </div>
    </div>
  </div>

  <script>
    function showSuccess(e) {
      e.preventDefault();
      var msg = document.getElementById('resultMsg');
      msg.innerHTML = '<div class="alert alert-success"><i class="bi bi-check-circle"></i> 预约成功！<a href="my-reservations.html" style="margin-left:8px;">查看我的预约</a></div>';
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('submitBtn').style.opacity = '0.5';
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
