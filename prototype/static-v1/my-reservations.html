<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的预约 - 图书馆座位预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/site.css">
</head>
<body>

  <nav class="frontend-nav">
    <div class="brand"><i class="bi bi-book"></i> 图书馆座位预约</div>
    <button class="hamburger"><i class="bi bi-list"></i></button>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="seats.html">座位列表</a>
      <a href="my-reservations.html" class="active">我的预约</a>
    </div>
    <div class="user-area" onclick="this.querySelector('.user-dropdown').classList.toggle('show')">
      <div class="avatar"><i class="bi bi-person"></i></div>
      <div class="user-dropdown">
        <a href="my-reservations.html"><i class="bi bi-calendar-check"></i> 我的预约</a>
        <a href="#"><i class="bi bi-arrow-repeat"></i> 切换账号</a>
        <div class="divider"></div>
        <a href="index.html"><i class="bi bi-box-arrow-right"></i> 退出</a>
      </div>
    </div>
  </nav>

  <div class="frontend-page">
    <h2 style="font-size:20px;font-weight:600;margin-bottom:12px;"><i class="bi bi-calendar-check"></i> 我的预约</h2>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>座位</th><th>日期</th><th>时段</th><th>状态</th><th>操作</th></tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>A-01</strong></td>
              <td>7/6</td>
              <td>8:00-10:00</td>
              <td><span class="tag tag-reserved">已预约</span></td>
              <td><button class="btn btn-danger btn-sm" onclick="showCancelModal(this)">取消</button></td>
            </tr>
            <tr>
              <td><strong>B-03</strong></td>
              <td>7/5</td>
              <td>14:00-16:00</td>
              <td><span class="tag tag-cancelled">已取消</span></td>
              <td><span style="color:var(--secondary);font-size:13px;">—</span></td>
            </tr>
            <tr>
              <td><strong>C-01</strong></td>
              <td>7/4</td>
              <td>9:00-11:00</td>
              <td><span class="tag tag-cancelled">已取消</span></td>
              <td><span style="color:var(--secondary);font-size:13px;">—</span></td>
            </tr>
            <tr>
              <td><strong>A-02</strong></td>
              <td>7/3</td>
              <td>10:00-12:00</td>
              <td><span class="tag tag-expired">已过期</span></td>
              <td><span style="color:var(--secondary);font-size:13px;">—</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="cancelModal">
    <div class="modal-box">
      <h3><i class="bi bi-exclamation-triangle" style="color:#dc3545;"></i> 确认取消预约</h3>
      <p>取消后该座位将释放供他人预约，确定要取消吗？</p>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="hideCancelModal()">返回</button>
        <button class="btn btn-danger" onclick="confirmCancel()">确定取消</button>
      </div>
    </div>
  </div>

  <script>
    var currentBtn = null;
    function showCancelModal(btn) {
      currentBtn = btn;
      document.getElementById('cancelModal').classList.add('show');
    }
    function hideCancelModal() {
      document.getElementById('cancelModal').classList.remove('show');
    }
    function confirmCancel() {
      if (currentBtn) {
        var row = currentBtn.closest('tr');
        row.querySelector('td:nth-child(4)').innerHTML = '<span class="tag tag-cancelled">已取消</span>';
        row.querySelector('td:nth-child(5)').innerHTML = '<span style="color:var(--secondary);font-size:13px;">—</span>';
      }
      hideCancelModal();
    }
    document.getElementById('cancelModal').addEventListener('click', function(e) {
      if (e.target === this) hideCancelModal();
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
