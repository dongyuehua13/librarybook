<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 - 图书馆座位预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/site.css">
  <style>
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--light-bg); padding: 20px; }
    .login-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 32px; width: 100%; max-width: 400px; }
    .login-card .logo { text-align: center; margin-bottom: 24px; }
    .login-card .logo i { font-size: 40px; color: var(--dark); }
    .login-card .logo h3 { font-size: 20px; margin-top: 8px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="logo">
        <i class="bi bi-shield-lock"></i>
        <h3>管理后台登录</h3>
      </div>

      <div class="alert alert-danger" style="display:none;" id="errorMsg">
        <i class="bi bi-exclamation-circle"></i> 管理员账号不存在
      </div>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>管理员账号</label>
          <input type="text" value="admin" placeholder="请输入管理员账号">
        </div>
        <p style="font-size:12px;color:var(--secondary);margin:-8px 0 14px;">课堂实训简化版，输入账号直接登录，无需密码</p>
        <button type="submit" class="btn btn-dark btn-block"><i class="bi bi-box-arrow-in-right"></i> 登录</button>
      </form>

      <div style="text-align:center;margin-top:16px;">
        <a href="../index.html" style="font-size:14px;color:var(--secondary);"><i class="bi bi-arrow-left"></i> 返回首页</a>
      </div>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      var input = e.target.querySelector('input');
      if (input.value.trim() === 'admin') {
        window.location.href = 'seats.html';
      } else {
        document.getElementById('errorMsg').style.display = 'flex';
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
