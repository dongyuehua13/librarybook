<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座位管理 - 管理后台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/site.css">
</head>
<body>

  <nav class="admin-nav">
    <div class="brand"><i class="bi bi-shield-lock"></i> 管理后台</div>
    <div class="nav-links">
      <a href="seats.html" class="active">座位管理</a>
      <a href="reservations.html">预约管理</a>
      <a href="stats.html">数据统计</a>
    </div>
    <div class="admin-actions">
      <a href="../index.html"><i class="bi bi-house-door"></i> 返回前台</a>
      <a href="login.html" class="logout"><i class="bi bi-box-arrow-right"></i> 退出</a>
    </div>
  </nav>

  <div class="admin-page">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="font-size:22px;font-weight:600;"><i class="bi bi-grid-3x3-gap"></i> 座位管理</h2>
      <button class="btn btn-dark btn-sm" onclick="alert('新增座位表单')"><i class="bi bi-plus-lg"></i> 新增</button>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>编号</th><th>楼层</th><th>区域</th><th>描述</th><th>状态</th><th>操作</th></tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>A-01</strong></td><td>1</td><td>自习区</td><td>靠窗位置，有插座</td>
              <td><span class="tag tag-active">启用</span></td>
              <td>
                <button class="btn btn-sm btn-outline" onclick="alert('编辑座位 A-01')" style="margin-right:4px;">编辑</button>
                <button class="btn btn-sm btn-outline" style="color:#dc3545;border-color:#dc3545;" onclick="alert('已禁用 A-01')">禁用</button>
              </td>
            </tr>
            <tr>
              <td><strong>A-02</strong></td><td>1</td><td>自习区</td><td>靠窗位置</td>
              <td><span class="tag tag-inactive">禁用</span></td>
              <td>
                <button class="btn btn-sm btn-outline" onclick="alert('编辑座位 A-02')" style="margin-right:4px;">编辑</button>
                <button class="btn btn-sm btn-outline" style="color:var(--success);border-color:var(--success);" onclick="alert('已启用 A-02')">启用</button>
              </td>
            </tr>
            <tr>
              <td><strong>A-03</strong></td><td>1</td><td>自习区</td><td>中间位置</td>
              <td><span class="tag tag-active">启用</span></td>
              <td>
                <button class="btn btn-sm btn-outline" style="margin-right:4px;">编辑</button>
                <button class="btn btn-sm btn-outline" style="color:#dc3545;border-color:#dc3545;">禁用</button>
              </td>
            </tr>
            <tr>
              <td><strong>B-01</strong></td><td>2</td><td>安静区</td><td>独立隔间</td>
              <td><span class="tag tag-active">启用</span></td>
              <td>
                <button class="btn btn-sm btn-outline" style="margin-right:4px;">编辑</button>
                <button class="btn btn-sm btn-outline" style="color:#dc3545;border-color:#dc3545;">禁用</button>
              </td>
            </tr>
            <tr>
              <td><strong>B-02</strong></td><td>2</td><td>安静区</td><td>独立隔间</td>
              <td><span class="tag tag-active">启用</span></td>
              <td>
                <button class="btn btn-sm btn-outline" style="margin-right:4px;">编辑</button>
                <button class="btn btn-sm btn-outline" style="color:#dc3545;border-color:#dc3545;">禁用</button>
              </td>
            </tr>
            <tr>
              <td><strong>C-01</strong></td><td>3</td><td>电子阅览区</td><td>带电脑位</td>
              <td><span class="tag tag-active">启用</span></td>
              <td>
                <button class="btn btn-sm btn-outline" style="margin-right:4px;">编辑</button>
                <button class="btn btn-sm btn-outline" style="color:#dc3545;border-color:#dc3545;">禁用</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
