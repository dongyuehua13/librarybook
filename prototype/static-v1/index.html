<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>首页 - 图书馆座位预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/site.css">
</head>
<body>

  <nav class="frontend-nav">
    <div class="brand"><i class="bi bi-book"></i> 图书馆座位预约</div>
    <button class="hamburger" onclick="document.querySelector('.nav-links').style.display='flex'"><i class="bi bi-list"></i></button>
    <div class="nav-links">
      <a href="index.html" class="active">首页</a>
      <a href="seats.html">座位列表</a>
      <a href="my-reservations.html">我的预约</a>
    </div>
    <div class="user-area" onclick="this.querySelector('.user-dropdown').classList.toggle('show')">
      <div class="avatar"><i class="bi bi-person"></i></div>
      <div class="user-dropdown">
        <a href="my-reservations.html"><i class="bi bi-calendar-check"></i> 我的预约</a>
        <a href="#"><i class="bi bi-arrow-repeat"></i> 切换账号</a>
        <div class="divider"></div>
        <a href="index.html"><i class="bi bi-box-arrow-right"></i> 退出</a>
      </div>
    </div>
  </nav>

  <div class="frontend-page">
    <div class="text-center mb-3 mt-2">
      <h1 style="font-size:22px;font-weight:700;color:var(--primary);"><i class="bi bi-book"></i> 图书馆座位预约系统</h1>
      <p style="color:var(--secondary);font-size:14px;">便捷预约，高效学习</p>
    </div>

    <div class="alert alert-success" style="display:flex;align-items:center;justify-content:space-between;">
      <span><i class="bi bi-person-circle"></i> 当前用户：<strong>张三</strong></span>
      <a href="index.html" style="font-size:13px;color:#842029;">退出</a>
    </div>

    <div class="stats-row">
      <div class="stat-card primary">
        <div class="number">15</div>
        <div class="label">座位总数</div>
      </div>
      <div class="stat-card success">
        <div class="number">3</div>
        <div class="label">今日预约</div>
      </div>
      <div class="stat-card info">
        <div class="number">3</div>
        <div class="label">楼层</div>
      </div>
    </div>

    <div class="entry-cards">
      <div class="entry-card">
        <div class="icon" style="color:var(--primary);"><i class="bi bi-grid-3x3-gap"></i></div>
        <h4>浏览座位</h4>
        <p>查看各楼层座位状态</p>
        <a href="seats.html" class="btn btn-primary btn-sm" style="width:100%;">查看座位</a>
      </div>
      <div class="entry-card">
        <div class="icon" style="color:var(--success);"><i class="bi bi-calendar-check"></i></div>
        <h4>我的预约</h4>
        <p>查看和管理预约记录</p>
        <a href="my-reservations.html" class="btn btn-success btn-sm" style="width:100%;">查看预约</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
